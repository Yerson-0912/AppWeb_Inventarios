name: Tests and Linting

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 black isort
    
    - name: Lint with flake8
      run: |
        # Detener build si hay errores de sintaxis o nombres indefinidos
        flake8 main.py tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Advertencias sobre complejidad (no aborta build)
        flake8 main.py tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check formatting with black
      run: |
        black --check main.py tests/
      continue-on-error: true
    
    - name: Check import sorting with isort
      run: |
        isort --check-only main.py tests/
      continue-on-error: true
    
    - name: Run tests with pytest
      run: |
        pytest tests/ -v --tb=short
    
    - name: Generate coverage report
      run: |
        pytest tests/ --cov=. --cov-report=xml --cov-report=html

  build-exe:
    runs-on: windows-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build executable
      run: |
        pyinstaller reportstock.spec
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: ReportStock-exe
        path: dist/ReportStock.exe
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/ReportStock.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
